dashboard:
  title: "CADE"

extra_roots:
  - name: common-knowledge
    path: "../common-knowledge"
    label: "common-knowledge"
    default: true

data_sources:
  plan_docs:
    type: directory
    path: docs/plans/
    parse: frontmatter
    refresh_interval: 0

views:
  - id: plans
    title: "Plans"
    default: true
    panels:
      - id: design-plans
        title: "Active Plans — Design"
        source: plan_docs
        component: cards
        props:
          filter: "tags contains 'dashboard'"
        fields: [title, status, created]
        badges: [status]
