<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CADE</title>
  </head>
  <body>
    <div id="tab-bar" class="tab-bar"></div>
    <div id="app" class="app-wrapper">
      <div id="tab-content" class="tab-content"></div>
    </div>

    <!-- Mobile touch toolbar -->
    <div id="touch-toolbar" class="touch-toolbar" style="display: none;"></div>

    <!-- Mobile UI elements -->
    <div id="viewer-slideout" class="viewer-slideout">
      <div class="viewer-slideout-header">
        <button id="slideout-back" class="slideout-back" aria-label="Back to explorer">&#8249;</button>
        <span id="slideout-title" class="slideout-title"></span>
        <button id="slideout-close" class="slideout-close" aria-label="Close viewer">&times;</button>
      </div>
      <div id="slideout-file-tree" class="slideout-file-tree"></div>
      <div id="slideout-content" class="viewer-slideout-content"></div>
    </div>
    <div id="slideout-backdrop" class="slideout-backdrop"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
